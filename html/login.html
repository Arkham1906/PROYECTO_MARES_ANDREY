<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumínara — Iniciar Sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-lumina">
    <div class="container">
      <a class="navbar-brand" href="../index.html">
        <img src="../img/icons/logo-bulb.png" alt="Lumínara logo" style="height:5rem;width:auto;margin-right:0.5rem;vertical-align:middle;">LUMÍNARA
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="catalogo.html">Catálogo</a></li>
          <li class="nav-item"><a class="nav-link" href="carrito.html">Carrito</a></li>
          <li class="nav-item"><a class="nav-link" href="nosotros.html">Nosotros</a></li>
          <li class="nav-item"><a class="nav-link" href="contacto.html">Contacto</a></li>
          <li class="nav-item ms-2"><a class="nav-link active" href="login.html"><img src="../img/icons/icon-user.png" alt="Acceder" style="height:1rem;width:auto;margin-right:0.3rem;vertical-align:middle;">Acceder</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- LOGIN BODY -->
  <div class="login-wrapper">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-5">
          <div class="card login-card shadow-lg p-4 p-md-5">
            <div class="text-center mb-4">
              <img src="../img/icons/logo-bulb.png" alt="Lumínara" style="height:4rem;width:auto;">
              <h2 class="login-brand mt-2">LUMÍNARA</h2>
              <p class="label-caps mt-1">Bienvenido de vuelta</p>
            </div>

            <form class="form-lumina" novalidate>
              <!-- Email -->
              <div class="mb-3">
                <label class="form-label" for="email">
                  <img src="../img/icons/icon-envelope.png" alt="Email" style="height:1rem;width:auto;margin-right:0.3rem;vertical-align:middle;"> Correo electrónico
                </label>
                <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required />
              </div>

              <!-- Password -->
              <div class="mb-4">
                <label class="form-label" for="password">
                  <img src="../img/icons/icon-lock.png" alt="Contraseña" style="height:1rem;width:auto;margin-right:0.3rem;vertical-align:middle;"> Contraseña
                </label>
                <div class="input-group">
                  <input type="password" id="password" class="form-control" placeholder="••••••••" required />
                  <button class="input-group-text" type="button" id="togglePass" style="cursor:pointer;">
                    <img src="../img/icons/icon-eye.png" alt="Ver contraseña" id="eyeIcon" style="height:1rem;width:auto;cursor:pointer;">
                  </button>
                </div>
              </div>

              <!-- Recuérdame -->
              <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="remember" />
                  <label class="form-check-label" for="remember" style="font-size:0.82rem;color:var(--color-muted);">
                    Recordarme
                  </label>
                </div>
                <a href="#" style="font-size:0.82rem;color:var(--color-gold);text-decoration:none;">
                  ¿Olvidaste tu contraseña?
                </a>
              </div>

              <!-- Botón acceso -->
              <div class="d-grid mb-3">
                <a href="perfil.html" class="btn btn-lumina text-center">
                  Iniciar Sesión
                </a>
              </div>

              <div class="text-center">
                <hr style="border-color:var(--color-border);" />
                <p style="font-size:0.83rem;color:var(--color-muted);">
                  ¿No tienes cuenta?
                  <a href="#" style="color:var(--color-gold);text-decoration:none;font-weight:500;">
                    Crear cuenta gratis
                  </a>
                </p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer-lumina">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6">
          <p style="font-size:0.75rem;color:rgba(245,240,232,0.35);margin:0;">© 2026 Lumínara. Todos los derechos reservados.</p>
        </div>
        <div class="col-md-6 text-md-end mt-2 mt-md-0">
          <a href="#" style="color:rgba(245,240,232,0.35);font-size:1rem;margin-left:1rem;"><img src="../img/icons/social-instagram.png" alt="Instagram" style="height:1rem;width:auto;"></a>
          <a href="#" style="color:rgba(245,240,232,0.35);font-size:1rem;margin-left:1rem;"><img src="../img/icons/social-facebook.png" alt="Facebook" style="height:1rem;width:auto;"></a>
          <a href="#" style="color:rgba(245,240,232,0.35);font-size:1rem;margin-left:1rem;"><img src="../img/icons/social-pinterest.png" alt="Pinterest" style="height:1rem;width:auto;"></a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('togglePass').addEventListener('click', function(){
      const pass = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pass.type === 'password') {
        pass.type = 'text';
        icon.classList.replace('bi-eye','bi-eye-slash');
      } else {
        pass.type = 'password';
        icon.classList.replace('bi-eye-slash','bi-eye');
      }
    });
  </script>
  <script src="../js/main.js"></script>
</body>
</html>
